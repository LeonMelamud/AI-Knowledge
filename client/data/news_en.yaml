# Hot news data. Each section MUST have a date (YYYY-MM-DD).
# Sections older than 6 months are hidden automatically (client/src/lib/data.ts)
# and can be physically removed with: node client/scripts/prune-news.mjs
hot_news:
  - section: AI Cybersecurity & Physical AI
    date: '2026-07-20'
    topics:
      - title: 'White House launches GOLD EAGLE for AI-assisted vulnerability coordination'
        description: >
          The White House announced GOLD EAGLE, a federal clearinghouse for
          coordinating cybersecurity-vulnerability intake, scanning and
          remediation across critical infrastructure. The initiative, created
          under the June 2026 AI-security executive order, says it will use
          frontier AI to prioritize and speed up defensive work with government
          agencies, open-source partners and industry.


          Key developments:

          - Treasury, DHS/CISA and the Department of War are participating with
          private-sector partners to coordinate faster exploit detection and
          remediation

          - The program says it uses frontier AI to reduce duplicated scanning
          and deliver prioritized vulnerability and remediation information to
          public- and private-sector defenders

          - GOLD EAGLE has begun receiving and prioritizing vulnerabilities;
          the announcement frames it as an operational cyber-defense program,
          not a new AI model or consumer product
        questions:
          - question: What is the GOLD EAGLE AI cybersecurity initiative?
            answer: >-
              GOLD EAGLE is a U.S. government clearinghouse for coordinating
              cybersecurity-vulnerability intake, verification and remediation.
              It is intended to use frontier AI and cross-sector coordination to
              help defenders identify and prioritize risks faster.
          - question: Why does GOLD EAGLE matter for AI security?
            answer: >-
              It is a concrete government deployment of frontier AI for
              defensive cyber operations. Its value will depend on safeguards,
              coordination with software maintainers and whether AI-assisted
              prioritization improves response without creating new risks.
        links:
          - name: White House — GOLD EAGLE vulnerability coordination announcement
            url: https://www.whitehouse.gov/releases/2026/07/white-house-launches-gold-eagle-initiative-for-unprecedented-cybersecurity-vulnerability-coordination
          - name: White House — AI innovation and security executive order
            url: https://www.whitehouse.gov/presidential-actions/2026/06/promoting-advanced-artificial-intelligence-innovation-and-security

      - title: 'Nvidia and Japan advance a national physical-AI infrastructure plan'
        description: >
          Following Jensen Huang's July visit to Tokyo, Nvidia and Japanese
          industrial partners outlined projects that pair a national AI factory
          with domestic models for robots, vehicles and factory floors. The
          effort puts physical AI and sovereign infrastructure at the center of
          Japan's industrial strategy.


          Key developments:

          - The Noetra initiative brings together roughly 44 domestic companies,
          including SoftBank, Sony, NEC and Honda, around Japanese AI for
          industrial and robotic use

          - Japan is committing up to 1 trillion yen over five years, while
          Nvidia plans a Vera Rubin AI factory expected to use 13,750 Vera CPUs
          and 27,500 Rubin GPUs

          - The roadmap starts with Japanese-language reasoning models, then
          adds multimodal capabilities and ultimately aims for AI that can run
          robots and other real-world systems
        questions:
          - question: What is Japan's physical-AI plan with Nvidia?
            answer: >-
              Japan is combining a planned national AI factory with domestic
              foundation models for industrial uses such as robots, vehicles and
              factories. Nvidia is supplying planned Rubin-generation
              infrastructure while Japanese companies develop the AI stack.
          - question: Why is physical AI important?
            answer: >-
              Physical AI applies models to machines operating in the real world,
              not only chat or software tasks. It can support robotics,
              manufacturing and autonomous systems, but requires reliable models,
              specialized data and rigorous safety controls.
        links:
          - name: TechCrunch — Nvidia's Japan physical-AI partnerships
            url: https://techcrunch.com/2026/07/19/what-to-watch-for-after-jensen-huangs-japan-visit
          - name: Nvidia — Japan, industrial leaders and Nvidia launch national AI infrastructure
            url: https://nvidianews.nvidia.com/news/japan-government-industrial-leaders-and-nvidia-launch-the-worlds-first-national-ai-infrastructure

  - section: Open Weights & Local AI Agents
    date: '2026-07-17'
    topics:
      - title: 'Thinking Machines releases Inkling, its first open-weights model'
        description: >
          Thinking Machines Lab released Inkling on July 15: its first model
          trained from scratch with downloadable open weights. The multimodal
          mixture-of-experts model is aimed at developers who want to adapt a
          capable base model to their own workflows rather than use a fixed API
          model.


          Key developments:

          - Inkling has 975 billion total parameters, with 41 billion active
          per token, and supports a context window of up to one million tokens

          - It natively accepts text, images and audio, and its weights are
          released under the Apache 2.0 license

          - Thinking Machines positions controllable reasoning effort and
          fine-tuning through its Tinker platform as the release's core value,
          while also previewing a smaller Inkling-Small model
        questions:
          - question: What is Inkling?
            answer: >-
              Inkling is Thinking Machines Lab's first open-weights foundation
              model. It is a 975B-parameter mixture-of-experts model with 41B
              active parameters that can reason over text, images and audio.
          - question: Why does Inkling matter for AI developers?
            answer: >-
              Its downloadable Apache 2.0 weights give teams a new large,
              multimodal base model to fine-tune and deploy for specialized
              agent, coding and retrieval workflows instead of relying only on
              closed model APIs.
        links:
          - name: Thinking Machines — Inkling open-weights announcement
            url: https://thinkingmachines.ai/news/introducing-inkling
          - name: Thinking Machines — Inkling model card
            url: https://thinkingmachines.ai/model-card/inkling

      - title: 'LM Studio previews Bionic, an agent built for open models'
        description: >
          LM Studio introduced Bionic, an initial-preview AI agent designed for
          open models. The product extends the company's local-model tooling
          from chat and inference into agentic work for code, creative tasks and
          everyday knowledge work.


          Key developments:

          - Bionic is designed to run natively on local open models, emphasizing
          user control of data, model choice and AI spending

          - LM Studio describes the agent as built for creativity, work and
          code, bringing agent workflows to its local-first ecosystem

          - The launch reflects a growing effort to make agentic tools usable
          with open weights rather than only with hosted frontier-model services
        questions:
          - question: What is LM Studio Bionic?
            answer: >-
              Bionic is LM Studio's new AI agent for open models. It is in
              initial preview and is designed to support creative work, general
              tasks and coding while retaining a local-first model workflow.
          - question: Why is a local-first AI agent useful?
            answer: >-
              A local-first agent can let users choose and run open models under
              their own data and cost controls. That can be valuable for private
              files, offline-capable workflows and teams that want less
              dependence on a single hosted-model provider.
        links:
          - name: LM Studio — Bionic product announcement
            url: https://lmstudio.ai/bionic
          - name: 9to5Mac — LM Studio expands beyond chat with Bionic
            url: https://9to5mac.com/2026/07/16/lm-studio-expands-beyond-chat-with-bionic-a-new-ai-agent-app-for-open-models

  - section: Frontier Models & Agentic Development
    date: '2026-07-11'
    topics:
      - title: 'OpenAI makes the GPT-5.6 family generally available'
        description: >
          OpenAI has moved the GPT-5.6 family from its limited preview to
          general availability. The release spans Sol, its flagship model;
          Terra, a balanced everyday model; and Luna, the cost-efficient tier.


          Key developments:

          - GPT-5.6 Sol is positioned for demanding coding, knowledge-work,
          cybersecurity and scientific tasks, while Terra and Luna offer
          lower-cost options for broader production use

          - OpenAI says the family improves the intelligence-to-cost and
          intelligence-to-latency trade-off for long agentic workflows

          - The general release follows a limited preview, making the family
          available beyond a small group of vetted partners
        questions:
          - question: What are GPT-5.6 Sol, Terra and Luna?
            answer: >-
              They are the three generally available models in OpenAI's GPT-5.6
              family: Sol is the flagship for the hardest work, Terra balances
              capability and cost for everyday use, and Luna is the most
              cost-efficient option.
          - question: Why does GPT-5.6 general availability matter?
            answer: >-
              A general release lets teams move from evaluating a restricted
              preview to building production applications. The three-tier
              lineup also lets developers match cost and speed to each part of
              an agentic workflow.
        links:
          - name: OpenAI — GPT-5.6 general availability
            url: https://openai.com/index/gpt-5-6
          - name: OpenAI — GPT-5.6 Sol preview and safety details
            url: https://openai.com/index/previewing-gpt-5-6-sol

      - title: 'Meta launches Muse Spark 1.1 and previews its first Model API'
        description: >
          Meta introduced Muse Spark 1.1, a multimodal reasoning model built
          for agentic tasks, and opened a public preview of the Meta Model API.
          The launch gives developers a direct path to build with a Meta model
          through the company’s own API.


          Key developments:

          - Meta says Muse Spark 1.1 improves tool use, computer use, coding
          and multimodal understanding for workflows that need planning and
          orchestration across apps and services

          - The model is available in Thinking mode in the Meta AI app and at
          meta.ai, while the new API is in public preview for developers

          - This is Meta's clearest move into the developer-model market,
          placing its agentic offering in more direct competition with OpenAI
          and Anthropic
        questions:
          - question: What is Muse Spark 1.1?
            answer: >-
              Muse Spark 1.1 is Meta's updated multimodal reasoning model for
              agentic work. Meta says it is stronger at planning, tool and
              computer use, coding, and understanding mixed text and visual
              inputs.
          - question: Why is the Meta Model API important?
            answer: >-
              The public preview gives developers a direct way to build with
              Meta's model through an API. It turns Meta from primarily a
              consumer-AI provider into a more direct platform competitor for
              agent and application developers.
        links:
          - name: Meta AI — Introducing Muse Spark 1.1
            url: https://ai.meta.com/blog/introducing-muse-spark-meta-model-api
          - name: Reuters — Meta debuts Muse Spark 1.1 with developer preview
            url: https://www.reuters.com/business/meta-debuts-muse-spark-11-with-preview-open-developers-2026-07-09

  - section: Voice & Multimodal AI
    date: '2026-07-10'
    topics:
      - title: 'OpenAI launches GPT-Live for real-time voice conversations'
        description: >
          OpenAI introduced GPT-Live on July 8, 2026, a new family of
          full-duplex voice models that can listen and speak at the same time
          and keep a conversation flowing while delegating harder work to GPT-5.5
          in the background.


          Key developments:

          - GPT-Live powers the new ChatGPT Voice experience with more natural
          turn-taking, quick acknowledgements and fewer awkward interruptions

          - The architecture separates continuous voice interaction from deeper
          search and reasoning, letting the system keep talking while a frontier
          model works behind the scenes

          - OpenAI is rolling out GPT-Live-1 and GPT-Live-1 mini globally in
          ChatGPT first, with API availability planned next
        questions:
          - question: What is GPT-Live?
            answer: >-
              GPT-Live is OpenAI's new voice-model family for natural spoken
              interaction. It uses a full-duplex design, so it can listen and
              speak at the same time instead of waiting for rigid turn-by-turn
              pauses.
          - question: Why does GPT-Live matter for AI products?
            answer: >-
              It points to a more agentic voice interface: the voice model keeps
              a natural conversation going while a stronger background model
              handles search, reasoning or other longer-running tasks. That can
              make AI assistants feel faster and more human in real use.
        links:
          - name: OpenAI product announcement
            url: https://openai.com/index/introducing-gpt-live/
          - name: GPT-Live system card
            url: https://deploymentsafety.openai.com/gpt-live

  - section: Agentic Browsers & AI Workflows
    date: '2026-07-09'
    topics:
      - title: 'Google makes the Gemini Interactions API the default for models and agents'
        description: >
          Google pushed its agent stack further this week by promoting the
          Gemini Interactions API to general availability and making it the
          primary interface for Gemini models and agents.


          Key developments:

          - The API now has a stable schema and becomes the default path in
          Google AI Studio, Gemini API docs and partner integrations

          - Google says long-running, stateful agent workflows will
          increasingly land on this interface, not the older generateContent
          flow

          - Managed Agents now support background execution, remote MCP server
          connections, custom functions and credential refresh, making hosted
          agents more practical for production workloads
        questions:
          - question: What is the Gemini Interactions API?
            answer: >-
              It is Google's unified API for both model calls and agentic
              workflows. Instead of stitching together separate endpoints,
              developers can use one interface for stateful interactions,
              background tasks, tool use and multimodal generation.
          - question: Why does this Google update matter for AI agents?
            answer: >-
              Because Google is standardizing its agent platform around one
              production API and adding the missing operational pieces —
              background execution, remote MCP access and credential handling —
              that teams need to run reliable agents at scale.
        links:
          - name: Google Interactions API GA
            url: https://blog.google/innovation-and-ai/technology/developers-tools/interactions-api-general-availability
          - name: Google Managed Agents update
            url: https://blog.google/innovation-and-ai/technology/developers-tools/expanding-managed-agents-gemini-api/
      - title: 'Chrome turns Gemini into an auto-browsing assistant'
        description: >
          Google also brought more visible agent behavior directly into the
          browser. Gemini in Chrome now gets a persistent side panel and a new
          auto browse mode that can handle multi-step web chores on the user's
          behalf.


          Key developments:

          - Gemini in Chrome can compare tabs, summarize content and work with
          connected Google apps such as Gmail, Calendar, Maps and Flights

          - Auto browse can research options, fill forms, collect documents and
          complete repetitive online tasks with user confirmation on sensitive
          actions

          - Google says Chrome will support its new Universal Commerce Protocol,
          an open standard meant to let AI agents act across shopping flows more
          consistently
        questions:
          - question: What is Chrome auto browse?
            answer: >-
              It is Google's new agentic browsing mode for Gemini in Chrome.
              In preview, it can perform multi-step tasks such as comparing
              travel options, gathering information across sites and filling in
              forms while keeping the user in the loop.
          - question: Why is agentic browsing a big deal?
            answer: >-
              It moves AI from summarizing pages to actually operating across
              the web. If the approach works reliably, browsers could become a
              major surface for AI assistants to handle research, shopping and
              admin work end to end.
        links:
          - name: Google Chrome Gemini auto browse announcement
            url: https://blog.google/products-and-platforms/products/chrome/gemini-3-auto-browse
  - section: AI Agents in Production
    date: '2026-07-08'
    topics:
      - title: 'Google Expands Managed Agents in the Gemini API'
        description: >
          Google said on July 7 that Managed Agents in the Gemini API are moving
          closer to production use with background execution, remote MCP support
          and better ways to run agents inside real environments.


          Key developments:

          - Agents can continue long-running work in the background instead of
          blocking the main app flow

          - Remote MCP support lets Gemini agents call external tools and
          services through the Model Context Protocol

          - Updated environment and credential controls are meant to make
          asynchronous agents more practical for real developer workflows
        questions:
          - question: What changed in Google's Managed Agents update?
            answer: >-
              Google added background-task support and remote MCP connectivity to
              Managed Agents in the Gemini API, making it easier to build agents
              that keep working asynchronously and call external tools in more
              realistic production environments.
          - question: Why does remote MCP matter for AI agents?
            answer: >-
              Remote MCP gives agents a standard way to connect to outside tools
              and services without every team inventing its own integration
              layer, which helps agent platforms move from demos to reusable
              production systems.
        links:
          - name: Google Blog — Expanding Managed Agents in Gemini API
            url: https://blog.google/innovation-and-ai/technology/developers-tools/expanding-managed-agents-gemini-api/
          - name: Gemini API docs — Managed agents quickstart
            url: https://ai.google.dev/gemini-api/docs/managed-agents-quickstart
      - title: 'Alberta Uses Claude Agents for Large-Scale Cybersecurity Review'
        description: >
          Anthropic published a July 6 case study showing the Government of
          Alberta using Claude Code with roughly 50 parallel agents to review
          and remediate security issues across government systems.


          Key developments:

          - Alberta says the agent-based review scanned 466 million lines of
          code in about 20 hours

          - Claude agents were used not only to find issues but also to propose
          fixes, write tests and help modernize legacy systems

          - The case suggests agentic code review is moving beyond startups into
          large public-sector production workloads
        questions:
          - question: What did Alberta claim Claude agents accomplished?
            answer: >-
              Alberta said Claude-based agents scanned 466 million lines of code
              in about 20 hours, identified vulnerabilities, and often helped
              generate fixes and tests under human review.
          - question: Why is this case study notable?
            answer: >-
              It is an unusually large real-world example of AI coding agents
              being used for continuous security review and remediation across
              government software systems rather than only small internal pilots.
        links:
          - name: Anthropic case study — Government of Alberta uses Claude to find and fix cybersecurity vulnerabilities
            url: https://www.anthropic.com/news/alberta-government-claude-cybersecurity
          - name: Alberta technical white papers
            url: https://thevelocitywhitepapers.com/
  - section: Frontier LLMs
    date: '2026-06-30'
    topics:
      - title: 'Anthropic Ships Claude Sonnet 5 and Claude Opus 4.8'
        description: >
          Anthropic released Claude Sonnet 5 on June 30, 2026, positioned as a
          near-Opus model at aggressive introductory pricing ($2 input / $10
          output per million tokens). It follows Claude Opus 4.8, released May
          28, which retook the top of the Artificial Analysis Intelligence
          Index with a score of 61.4, ahead of OpenAI's GPT-5.5 at 60.2.


          Key developments:

          - Sonnet 5 brings near-flagship quality to the mid-tier price point

          - Opus 4.8 leads the main cross-benchmark intelligence index

          - Anthropic's Fable 5 (Mythos-class tier) became globally available
          on July 1 after internal safety reviews

          - Anthropic launched Claude Science, aiming to compress life-science
          R&D cycles, after hiring AlphaFold lead John Jumper
        questions:
          - question: What is Claude Sonnet 5 and why does it matter?
            answer: >-
              Claude Sonnet 5 is Anthropic's mid-tier model released June 30,
              2026. It matters because it delivers close-to-flagship (Opus)
              quality at a much lower price, making frontier-level AI
              affordable for everyday products and high-volume workloads.
          - question: Which model currently leads the intelligence benchmarks?
            answer: >-
              As of June 2026, Claude Opus 4.8 leads the Artificial Analysis
              Intelligence Index with 61.4, slightly ahead of OpenAI's GPT-5.5
              at 60.2. Rankings shift quickly, so treat leaderboards as a
              snapshot rather than a verdict.
        links:
          - name: Anthropic Newsroom
            url: https://www.anthropic.com/news
      - title: 'OpenAI Previews GPT-5.6: Sol, Terra and Luna'
        description: >
          OpenAI previewed GPT-5.6 on June 26, 2026 as a three-model family:
          Sol (flagship), Terra (balanced everyday model) and Luna (fast,
          affordable tier). The release is initially gated to roughly 20
          government-vetted partner organizations, with general availability
          planned in the following weeks and Sol expected to run on Cerebras
          hardware at up to 750 tokens per second.
        questions:
          - question: What are GPT-5.6 Sol, Terra and Luna?
            answer: >-
              They are the three tiers of OpenAI's GPT-5.6 family previewed in
              June 2026 — Sol is the flagship, Terra the balanced everyday
              model, and Luna the fast low-cost tier. At preview time access
              was limited to about 20 vetted partner organizations.
        links:
          - name: OpenAI News
            url: https://openai.com/news/

  - section: Open Source LLMs
    date: '2026-06-13'
    topics:
      - title: 'A Big Month for Open Weights: MiniMax M3, Nemotron 3 Ultra, Kimi K2.7, GLM-5.2'
        description: >
          The open-weight ecosystem shipped four significant models in the
          first two weeks of June 2026, continuing to close the gap with
          proprietary frontier models.


          Key releases:

          - MiniMax M3 (June 1): 1-million-token context window and 59.0% on
          SWE-bench Pro

          - NVIDIA Nemotron 3 Ultra (June 4): 550B parameters under a fully
          permissive license

          - Kimi K2.7 Code (June 12): 1-trillion-parameter coding model using
          about 30% fewer thinking tokens than its predecessor

          - GLM-5.2 from Z.ai (June 13): 1M context, 91.2% on GPQA Diamond and
          99.2% on AIME 2026 — top of the open-weight field on reasoning
        questions:
          - question: How close are open-source models to proprietary ones in 2026?
            answer: >-
              Very close on many benchmarks. Open-weight models like GLM-5.2
              score over 91% on GPQA Diamond and handle million-token
              contexts, rivaling proprietary models on reasoning tasks, though
              frontier proprietary models still lead on the hardest
              agentic and multimodal workloads.
        links:
          - name: Open-source LLM tracker
            url: https://llm-stats.com/ai-news

  - section: AI Agents & MCP
    date: '2026-06-02'
    topics:
      - title: 'Google Brings WebMCP to Chrome; MCP Passes 97M Monthly Downloads'
        description: >
          At I/O 2026 (May 19) Google framed Chrome as an agentic surface —
          browsers where AI can read, act, debug and automate workflows — and
          announced WebMCP alongside built-in AI APIs. On June 2, Chrome 149
          added experimental WebMCP debugging tools to DevTools.


          The Model Context Protocol itself has become the de-facto standard:
          over 97 million monthly SDK downloads, adoption by Anthropic,
          OpenAI, Google, Microsoft and Amazon, and MCP Apps extending the
          protocol with interactive UI elements from platforms like Figma and
          Slack.


          Security is the growing pain: researchers found hundreds of MCP
          servers exposed to the internet with no authentication, making agent
          security a top 2026 concern.
        questions:
          - question: What is WebMCP?
            answer: >-
              WebMCP is Google's effort to bring the Model Context Protocol
              into the browser, letting websites expose structured tools that
              AI agents can call directly in Chrome. Chrome 149 shipped
              experimental WebMCP debugging tools in DevTools in June 2026.
          - question: Why is MCP security a concern in 2026?
            answer: >-
              Because MCP adoption exploded faster than security practices.
              Researchers found hundreds of MCP servers publicly exposed with
              zero authentication, which can leak data or let attackers drive
              agents. Authentication and least-privilege tool scopes are now
              considered mandatory for production MCP deployments.
        links:
          - name: Chrome DevTools updates
            url: https://developer.chrome.com/docs/devtools/news

