    topics:
      - title: "הבית הלבן משיק את GOLD EAGLE לתיאום חולשות בעזרת AI"
        description: >
          הבית הלבן הודיע על GOLD EAGLE, מוקד פדרלי לתיאום קבלת דיווחים על
          חולשות סייבר, סריקה ותיקון שלהן בתשתיות קריטיות. היוזמה, שנוצרה לפי
          הצו הנשיאותי מיוני 2026 בנושא אבטחת AI, אמורה להשתמש במודלי חזית כדי
          לתעדף ולהאיץ עבודת הגנה עם גופי ממשל, שותפי קוד פתוח והתעשייה.


          התפתחויות מרכזיות:

          - משרד האוצר, DHS/CISA ומשרד המלחמה משתתפים עם שותפים מהסקטור הפרטי
          כדי לתאם זיהוי מהיר יותר של ניצולים ותיקון

          - לפי התוכנית, AI בחזית ישמש לצמצום סריקות כפולות ולהעברת מידע מתועדף
          על חולשות ועל תיקונים למגינים במגזר הציבורי והפרטי

          - GOLD EAGLE כבר החלה לקבל ולתעדף חולשות; ההכרזה מציגה אותה כתוכנית
          סייבר הגנתית תפעולית, ולא כמודל AI חדש או כמוצר צרכני
        questions:
          - question: "מהי יוזמת GOLD EAGLE לאבטחת סייבר עם AI?"
            answer: >-
              GOLD EAGLE היא מסלקה של ממשלת ארה"ב לתיאום קבלת דיווחים על
              חולשות סייבר, אימותן ותיקונן. מטרתה להשתמש ב-AI בחזית ובתיאום בין
              מגזרים כדי לעזור למגינים לזהות ולתעדף סיכונים מהר יותר.
          - question: "למה GOLD EAGLE חשובה לאבטחת AI?"
            answer: >-
              זהו יישום ממשלתי מעשי של AI בחזית לפעולות סייבר הגנתיות. ערכו
              יהיה תלוי במנגנוני ההגנה, בתיאום עם מתחזקי תוכנה ובשאלה אם התעדוף
              בעזרת AI ישפר את התגובה בלי ליצור סיכונים חדשים.
        links:
