      - title: "OpenAI מגישה תשקיף להנפקה; אנתרופיק עוקפת את OpenAI בהכנסות"
        description: >
          OpenAI הגישה תשקיף S-1 חסוי ל-SEC ב-8 ביוני 2026, צעד ראשון לקראת
          הנפקה היסטורית, לאחר הערכת שווי פרטית של כ-852 מיליארד דולר במרץ.
          במקביל, אנתרופיק עקפה את OpenAI בהכנסות מדווחות וצופה רווחיות עד
          2029 — שנה לפני התחזיות של OpenAI.


          מהלכים נוספים בתעשייה:

          - הבית הלבן בשיחות מתקדמות עם OpenAI, גוגל ואנתרופיק על תקני שחרור
          וולונטריים למודלי AI

          - GitHub Copilot עבר ב-1 ביוני מחיוב במנוי ללא הגבלה לחיוב לפי
          שימוש (GitHub AI Credits) בשל עלויות הרצה גואות

          - ברית המודיעין Five Eyes הזהירה ביוני שמודלי חזית ישנו את יכולות
          הסייבר בטווח של חודשים, לא שנים
        questions:
          - question: "למה GitHub Copilot עובר לחיוב לפי שימוש?"
            answer: >-
              כי עלויות ההרצה של מודלי קוד מודרניים הפכו את מנוי ה\"ללא
              הגבלה\" הישן ללא כלכלי. החל מ-1 ביוני 2026 Copilot משתמש
              ב-GitHub AI Credits — מודל מבוסס שימוש שבו משתמשים כבדים משלמים
              ביחס למחשוב שהם צורכים.
          - question: "מה משמעות הגשת ה-S-1 של OpenAI?"
            answer: >-
              תשקיף S-1 חסוי הוא הצעד הפורמלי הראשון לקראת הנפקה בבורסה.
              ההגשה ב-8 ביוני 2026, אחרי הערכת שווי פרטית של כ-852 מיליארד
              דולר, מאותתת ש-OpenAI מתכוונת להפוך לחברה ציבורית — מה שיחשוף
              את הכספים שלה לביקורת רחבה הרבה יותר.
        links:
          - name: "סיקור Fortune"
            url: https://fortune.com/2026/07/02/sam-altman-new-world-order-ai-openai-google-anthropic/
