              תוך שמירה על זרימת עבודה מקומית-תחילה עם מודלים.
          - question: "למה סוכן AI מקומי-תחילה שימושי?"
            answer: >-
              סוכן מקומי-תחילה מאפשר למשתמשים לבחור ולהריץ מודלים פתוחים תחת
              שליטה שלהם בנתונים ובעלויות. זה יכול להיות שימושי לקבצים פרטיים,
