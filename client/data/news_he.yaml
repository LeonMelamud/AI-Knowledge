          התפתחויות מרכזיות:

          - Bionic תוכנן לפעול באופן טבעי על מודלים פתוחים מקומיים, עם דגש על
          שליטת המשתמש בנתונים, בבחירת המודל ובהוצאות על AI

          - ב-LM Studio מתארים את הסוכן כמוצר ליצירה, לעבודה ולקוד, שמביא
          זרימות עבודה סוכניות לאקוסיסטם המקומי-תחילה שלהם

          - ההשקה משקפת מאמץ מתרחב להפוך כלים סוכניים לשמישים עם משקולות פתוחות,
