      - title: "Nvidia ויפן מקדמות תוכנית לאומית לתשתיות AI פיזי"
        description: >
          בעקבות ביקורו של ג'נסן הואנג בטוקיו ביולי, Nvidia ושותפים תעשייתיים
          ביפן הציגו פרויקטים שמשלבים מפעל AI לאומי עם מודלים מקומיים לרובוטים,
          לכלי רכב ולרצפות ייצור. המהלך מציב AI פיזי ותשתית ריבונית במרכז
          האסטרטגיה התעשייתית של יפן.


          התפתחויות מרכזיות:

          - יוזמת Noetra מאגדת כ-44 חברות יפניות, בהן SoftBank, Sony, NEC
          ו-Honda, סביב AI יפני לשימוש תעשייתי ורובוטי

          - יפן מתחייבת לעד טריליון ין בחמש שנים, בעוד Nvidia מתכננת מפעל AI
          מסוג Vera Rubin שצפוי לכלול 13,750 מעבדי Vera ו-27,500 מעבדי Rubin
          גרפיים

          - מפת הדרכים מתחילה במודלי הסקה ביפנית, אחר כך מוסיפה יכולות
          מולטימודליות, ולבסוף מכוונת ל-AI שיוכל להפעיל רובוטים ומערכות בעולם
          האמיתי
        questions:
          - question: "מהי תוכנית ה-AI הפיזי של יפן עם Nvidia?"
            answer: >-
              יפן משלבת מפעל AI לאומי מתוכנן עם מודלי בסיס מקומיים לשימושים
              תעשייתיים כמו רובוטים, כלי רכב ומפעלים. Nvidia אמורה לספק תשתית
              מתוכננת מדור Rubin, בעוד חברות יפניות מפתחות את שכבת ה-AI.
          - question: "למה AI פיזי חשוב?"
            answer: >-
              AI פיזי מיישם מודלים על מכונות שפועלות בעולם האמיתי, ולא רק על
              צ'אט או משימות תוכנה. הוא יכול לתמוך ברובוטיקה, בייצור ובמערכות
              אוטונומיות, אך דורש מודלים אמינים, נתונים ייעודיים ובקרות בטיחות
              קפדניות.
        links:
          - name: "TechCrunch — השותפויות של Nvidia ל-AI פיזי ביפן"
            url: https://techcrunch.com/2026/07/19/what-to-watch-for-after-jensen-huangs-japan-visit
          - name: "Nvidia — יפן ומובילי התעשייה משיקים תשתית AI לאומית"
            url: https://nvidianews.nvidia.com/news/japan-government-industrial-leaders-and-nvidia-launch-the-worlds-first-national-ai-infrastructure

  - section: "משקולות פתוחות וסוכני AI מקומיים"
    date: '2026-07-17'
    topics:
      - title: "Thinking Machines משחררת את Inkling, מודל המשקולות הפתוחות הראשון שלה"
        description: >
          Thinking Machines Lab שחררה ב-15 ביולי את Inkling, המודל הראשון שלה
          שאומן מאפס ושמשקולותיו זמינות להורדה. מודל ה-Mixture-of-Experts
          המולטימודלי מיועד למפתחים שרוצים להתאים מודל בסיס חזק לזרימות העבודה
          שלהם, במקום להשתמש במודל API קבוע.


          התפתחויות מרכזיות:

          - ל-Inkling יש 975 מיליארד פרמטרים בסך הכול, מתוכם 41 מיליארד פעילים
          בכל טוקן, והוא תומך בחלון הקשר של עד מיליון טוקנים

          - הוא מקבל באופן טבעי טקסט, תמונות ואודיו, ומשקולותיו שוחררו ברישיון
          Apache 2.0

          - Thinking Machines מציבה יכולת לשלוט במאמץ ההסקה ואת הכוונון העדין
          דרך פלטפורמת Tinker במרכז ההשקה, ובמקביל מציגה תצוגה מקדימה של
          Inkling-Small הקטן יותר
        questions:
          - question: "מהו Inkling?"
            answer: >-
              Inkling הוא מודל הבסיס הראשון עם משקולות פתוחות של Thinking
              Machines Lab. זהו מודל Mixture-of-Experts עם 975 מיליארד
              פרמטרים, 41 מיליארד מהם פעילים, שיכול להסיק מטקסט, תמונות ואודיו.
          - question: "למה Inkling חשוב למפתחי AI?"
            answer: >-
              המשקולות שלו, הזמינות להורדה ברישיון Apache 2.0, מספקות לצוותים
              מודל בסיס מולטימודלי גדול נוסף שאפשר לכוונן ולהריץ עבור זרימות
              עבודה ייעודיות של סוכנים, קוד ו-RAG, במקום להסתמך רק על ממשקי API
              של מודלים סגורים.
        links:
          - name: "Thinking Machines — הכרזת Inkling עם משקולות פתוחות"
            url: https://thinkingmachines.ai/news/introducing-inkling
          - name: "Thinking Machines — כרטיס המודל של Inkling"
            url: https://thinkingmachines.ai/model-card/inkling

