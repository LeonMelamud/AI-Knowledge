    topics:
      - title: "אנתרופיק משיקה את Claude Sonnet 5 ואת Claude Opus 4.8"
        description: >
          אנתרופיק שחררה את Claude Sonnet 5 ב-30 ביוני 2026, מודל ביניים
          באיכות קרובה ל-Opus במחיר השקה אגרסיבי (2$ קלט / 10$ פלט למיליון
          טוקנים). ההשקה מגיעה אחרי Claude Opus 4.8 מ-28 במאי, שחזר לראש
          מדד האינטליגנציה של Artificial Analysis עם ציון 61.4, לפני GPT-5.5
          של OpenAI עם 60.2.


          התפתחויות מרכזיות:

          - Sonnet 5 מביא איכות כמעט-פלגשיפ לרמת מחיר הביניים

          - Opus 4.8 מוביל את מדד האינטליגנציה הבין-בנצ'מרקי המרכזי

          - Fable 5 של אנתרופיק (שכבת Mythos) הפך זמין גלובלית ב-1 ביולי
          לאחר בדיקות בטיחות פנימיות

          - אנתרופיק השיקה את Claude Science במטרה לקצר מחזורי מו"פ במדעי
          החיים, לאחר גיוסו של ג'ון ג'אמפר, מוביל AlphaFold
        questions:
          - question: "מהו Claude Sonnet 5 ולמה הוא חשוב?"
            answer: >-
              Claude Sonnet 5 הוא מודל הביניים של אנתרופיק ששוחרר ב-30 ביוני
              2026. חשיבותו בכך שהוא מספק איכות קרובה לדגל (Opus) במחיר נמוך
              משמעותית, מה שהופך בינה מלאכותית ברמת החזית לזמינה למוצרים
              יומיומיים ולעומסי עבודה גדולים.
          - question: "איזה מודל מוביל כיום את מדדי האינטליגנציה?"
            answer: >-
              נכון ליוני 2026, Claude Opus 4.8 מוביל את מדד Artificial
              Analysis עם 61.4, מעט לפני GPT-5.5 של OpenAI עם 60.2. הדירוגים
              משתנים במהירות, לכן כדאי להתייחס אליהם כתמונת מצב ולא כפסק דין.
        links:
          - name: "חדשות אנתרופיק"
            url: https://www.anthropic.com/news
      - title: "OpenAI חושפת את GPT-5.6: Sol, Terra ו-Luna"
        description: >
          OpenAI הציגה תצוגה מקדימה של GPT-5.6 ב-26 ביוני 2026 כמשפחה של
          שלושה מודלים: Sol (הדגל), Terra (המודל היומיומי המאוזן) ו-Luna
          (השכבה המהירה והזולה). הגישה הראשונית מוגבלת לכ-20 ארגונים שאושרו
          על ידי הממשל, עם זמינות כללית מתוכננת בשבועות הקרובים ו-Sol צפוי
          לרוץ על חומרת Cerebras במהירות של עד 750 טוקנים בשנייה.
        questions:
          - question: "מהם GPT-5.6 Sol, Terra ו-Luna?"
            answer: >-
              אלו שלוש השכבות של משפחת GPT-5.6 שהוצגה ביוני 2026 — Sol הוא
              הדגל, Terra המודל היומיומי המאוזן ו-Luna השכבה המהירה והזולה.
              בשלב התצוגה המקדימה הגישה הוגבלה לכ-20 ארגונים מאושרים.
        links:
          - name: "חדשות OpenAI"
            url: https://openai.com/news/

