        description: >
          אקוסיסטם המודלים הפתוחים שחרר ארבעה מודלים משמעותיים בשבועיים
          הראשונים של יוני 2026, וממשיך לסגור את הפער מול המודלים הקנייניים.


          שחרורים מרכזיים:

          - MiniMax M3 (1 ביוני): חלון הקשר של מיליון טוקנים ו-59.0% על
          SWE-bench Pro

          - NVIDIA Nemotron 3 Ultra (4 ביוני): 550 מיליארד פרמטרים ברישיון
          מתירני לחלוטין

          - Kimi K2.7 Code (12 ביוני): מודל קוד עם טריליון פרמטרים שמשתמש
          בכ-30% פחות טוקני חשיבה מקודמו

          - GLM-5.2 מבית Z.ai (13 ביוני): הקשר של מיליון טוקנים, 91.2% על
          GPQA Diamond ו-99.2% על AIME 2026 — בראש השדה הפתוח בהסקה
        questions:
          - question: "כמה קרובים מודלי הקוד הפתוח למודלים הקנייניים ב-2026?"
            answer: >-
              קרובים מאוד בבנצ'מרקים רבים. מודלים פתוחים כמו GLM-5.2 עוברים
              91% על GPQA Diamond ומתמודדים עם הקשרים של מיליון טוקנים,
              בדומה למודלים קנייניים במשימות הסקה — אם כי מודלי החזית
              הקנייניים עדיין מובילים במשימות סוכנים ומולטימודל הקשות ביותר.
        links:
          - name: "מעקב מודלים פתוחים"
            url: https://llm-stats.com/ai-news

  - section: "סוכני AI ו-MCP"
    date: '2026-06-02'
    topics:
      - title: "גוגל מביאה את WebMCP לכרום; MCP חוצה 97 מיליון הורדות חודשיות"
        description: >
          בכנס I/O 2026 (19 במאי) גוגל הציגה את כרום כמשטח סוכנים — דפדפן שבו
          AI יכול לקרוא, לפעול, לדבג ולהריץ תהליכים אוטומטיים — והכריזה על
          WebMCP לצד ממשקי AI מובנים. ב-2 ביוני, כרום 149 הוסיף כלי דיבוג
          ניסיוניים ל-WebMCP ב-DevTools.


          פרוטוקול MCP עצמו הפך לסטנדרט בפועל: יותר מ-97 מיליון הורדות SDK
          חודשיות, אימוץ על ידי אנתרופיק, OpenAI, גוגל, מיקרוסופט ואמזון,
          ו-MCP Apps שמרחיב את הפרוטוקול עם רכיבי ממשק אינטראקטיביים
          מפלטפורמות כמו Figma ו-Slack.


          האבטחה היא כאב הגדילה: חוקרים מצאו מאות שרתי MCP חשופים לאינטרנט
          ללא אימות כלל, מה שהופך את אבטחת הסוכנים לנושא המרכזי של 2026.
        questions:
          - question: "מהו WebMCP?"
            answer: >-
              WebMCP הוא המהלך של גוגל להביא את פרוטוקול MCP אל הדפדפן,
              ומאפשר לאתרים לחשוף כלים מובנים שסוכני AI יכולים להפעיל ישירות
              בכרום. כרום 149 שחרר כלי דיבוג ניסיוניים ל-WebMCP ביוני 2026.
          - question: "למה אבטחת MCP מדאיגה ב-2026?"
            answer: >-
              כי אימוץ MCP צמח מהר יותר מפרקטיקות האבטחה. חוקרים מצאו מאות
              שרתי MCP חשופים לציבור ללא אימות, מה שעלול להדליף מידע או לאפשר
              לתוקפים להשתלט על סוכנים. אימות והרשאות מינימליות לכלים נחשבים
              כיום חובה בפריסות ייצור.
        links:
          - name: "עדכוני Chrome DevTools"
            url: https://developer.chrome.com/docs/devtools/news

