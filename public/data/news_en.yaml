# Hot news data. Each section MUST have a date (YYYY-MM-DD).
# Sections older than 6 months are hidden automatically (client/src/lib/data.ts)
# and can be physically removed with: node client/scripts/prune-news.mjs
hot_news:
  - section: Frontier LLMs
    date: '2026-06-30'
    topics:
      - title: 'Anthropic Ships Claude Sonnet 5 and Claude Opus 4.8'
        description: >
          Anthropic released Claude Sonnet 5 on June 30, 2026, positioned as a
          near-Opus model at aggressive introductory pricing ($2 input / $10
          output per million tokens). It follows Claude Opus 4.8, released May
          28, which retook the top of the Artificial Analysis Intelligence
          Index with a score of 61.4, ahead of OpenAI's GPT-5.5 at 60.2.


          Key developments:

          - Sonnet 5 brings near-flagship quality to the mid-tier price point

          - Opus 4.8 leads the main cross-benchmark intelligence index

          - Anthropic's Fable 5 (Mythos-class tier) became globally available
          on July 1 after internal safety reviews

          - Anthropic launched Claude Science, aiming to compress life-science
          R&D cycles, after hiring AlphaFold lead John Jumper
        questions:
          - question: What is Claude Sonnet 5 and why does it matter?
            answer: >-
              Claude Sonnet 5 is Anthropic's mid-tier model released June 30,
              2026. It matters because it delivers close-to-flagship (Opus)
              quality at a much lower price, making frontier-level AI
              affordable for everyday products and high-volume workloads.
          - question: Which model currently leads the intelligence benchmarks?
            answer: >-
              As of June 2026, Claude Opus 4.8 leads the Artificial Analysis
              Intelligence Index with 61.4, slightly ahead of OpenAI's GPT-5.5
              at 60.2. Rankings shift quickly, so treat leaderboards as a
              snapshot rather than a verdict.
        links:
          - name: Anthropic Newsroom
            url: https://www.anthropic.com/news
      - title: 'OpenAI Previews GPT-5.6: Sol, Terra and Luna'
        description: >
          OpenAI previewed GPT-5.6 on June 26, 2026 as a three-model family:
          Sol (flagship), Terra (balanced everyday model) and Luna (fast,
          affordable tier). The release is initially gated to roughly 20
          government-vetted partner organizations, with general availability
          planned in the following weeks and Sol expected to run on Cerebras
          hardware at up to 750 tokens per second.
        questions:
          - question: What are GPT-5.6 Sol, Terra and Luna?
            answer: >-
              They are the three tiers of OpenAI's GPT-5.6 family previewed in
              June 2026 — Sol is the flagship, Terra the balanced everyday
              model, and Luna the fast low-cost tier. At preview time access
              was limited to about 20 vetted partner organizations.
        links:
          - name: OpenAI News
            url: https://openai.com/news/

  - section: Open Source LLMs
    date: '2026-06-13'
    topics:
      - title: 'A Big Month for Open Weights: MiniMax M3, Nemotron 3 Ultra, Kimi K2.7, GLM-5.2'
        description: >
          The open-weight ecosystem shipped four significant models in the
          first two weeks of June 2026, continuing to close the gap with
          proprietary frontier models.


          Key releases:

          - MiniMax M3 (June 1): 1-million-token context window and 59.0% on
          SWE-bench Pro

          - NVIDIA Nemotron 3 Ultra (June 4): 550B parameters under a fully
          permissive license

          - Kimi K2.7 Code (June 12): 1-trillion-parameter coding model using
          about 30% fewer thinking tokens than its predecessor

          - GLM-5.2 from Z.ai (June 13): 1M context, 91.2% on GPQA Diamond and
          99.2% on AIME 2026 — top of the open-weight field on reasoning
        questions:
          - question: How close are open-source models to proprietary ones in 2026?
            answer: >-
              Very close on many benchmarks. Open-weight models like GLM-5.2
              score over 91% on GPQA Diamond and handle million-token
              contexts, rivaling proprietary models on reasoning tasks, though
              frontier proprietary models still lead on the hardest
              agentic and multimodal workloads.
        links:
          - name: Open-source LLM tracker
            url: https://llm-stats.com/ai-news

  - section: AI Agents & MCP
    date: '2026-06-02'
    topics:
      - title: 'Google Brings WebMCP to Chrome; MCP Passes 97M Monthly Downloads'
        description: >
          At I/O 2026 (May 19) Google framed Chrome as an agentic surface —
          browsers where AI can read, act, debug and automate workflows — and
          announced WebMCP alongside built-in AI APIs. On June 2, Chrome 149
          added experimental WebMCP debugging tools to DevTools.


          The Model Context Protocol itself has become the de-facto standard:
          over 97 million monthly SDK downloads, adoption by Anthropic,
          OpenAI, Google, Microsoft and Amazon, and MCP Apps extending the
          protocol with interactive UI elements from platforms like Figma and
          Slack.


          Security is the growing pain: researchers found hundreds of MCP
          servers exposed to the internet with no authentication, making agent
          security a top 2026 concern.
        questions:
          - question: What is WebMCP?
            answer: >-
              WebMCP is Google's effort to bring the Model Context Protocol
              into the browser, letting websites expose structured tools that
              AI agents can call directly in Chrome. Chrome 149 shipped
              experimental WebMCP debugging tools in DevTools in June 2026.
          - question: Why is MCP security a concern in 2026?
            answer: >-
              Because MCP adoption exploded faster than security practices.
              Researchers found hundreds of MCP servers publicly exposed with
              zero authentication, which can leak data or let attackers drive
              agents. Authentication and least-privilege tool scopes are now
              considered mandatory for production MCP deployments.
        links:
          - name: Chrome DevTools updates
            url: https://developer.chrome.com/docs/devtools/news

  - section: Vision & Image Generation
    date: '2026-06-03'
    topics:
      - title: 'Nano Banana 2 Lite, Gemini Omni Flash, Reve 2.0 and MAI-Image-2.5'
        description: >
          June 2026 was packed with image and video model news.


          Key developments:

          - Google released Nano Banana 2 Lite, its fastest and most
          cost-efficient Gemini Image model, and brought Gemini Omni Flash — a
          natively multimodal model for custom video workflows — to public API
          preview

          - Reve 2.0 (June 3) took #2 on the Arena text-to-image leaderboard
          with native 4K rendering and layout-based editing

          - Microsoft's MAI-Image-2.5 (June 2) holds #3, marking Microsoft's
          arrival as an independent image-model player

          - NVIDIA continues to push local generation, accelerating 4K AI
          video on RTX PCs with LTX-2 and ComfyUI upgrades
        questions:
          - question: What is the state of AI image generation in mid-2026?
            answer: >-
              Competition is intense — Google, Microsoft and startups like
              Reve trade places on the text-to-image leaderboards, native 4K
              output and precise layout editing are the new frontier, and
              fast, low-cost tiers (like Nano Banana 2 Lite) are making image
              generation nearly free for products.
        links:
          - name: Google AI updates (June 2026)
            url: https://blog.google/innovation-and-ai/technology/ai/google-ai-updates-june-2026/

  - section: Big Companies & Industry
    date: '2026-07-03'
    topics:
      - title: 'OpenAI Files for IPO; Anthropic Overtakes OpenAI on Revenue'
        description: >
          OpenAI filed a confidential S-1 with the SEC on June 8, 2026,
          setting the stage for a landmark IPO after a private valuation of
          about $852 billion in March. Meanwhile Anthropic has overtaken
          OpenAI in self-reported revenue and projects profitability by 2029,
          a year ahead of OpenAI's own projections.


          Other industry moves:

          - The White House is in advanced talks with OpenAI, Google and
          Anthropic on voluntary AI release standards

          - GitHub Copilot moved from unlimited subscriptions to usage-based
          metered billing (GitHub AI Credits) on June 1, citing escalating
          inference costs

          - The Five Eyes intelligence alliance warned in June that frontier
          models will transform cyber capabilities on a timeline of months,
          not years
        questions:
          - question: Why is GitHub Copilot moving to metered billing?
            answer: >-
              Because inference costs for modern coding models made the old
              unlimited subscription unsustainable. From June 1, 2026, Copilot
              uses GitHub AI Credits — a usage-based model where heavy users
              pay in proportion to the compute they consume.
          - question: What does OpenAI's S-1 filing mean?
            answer: >-
              A confidential S-1 is the first formal step toward a public
              stock offering. Filed June 8, 2026 after a private valuation of
              roughly $852 billion, it signals OpenAI intends to go public,
              which would subject its finances to far more scrutiny.
        links:
          - name: Fortune coverage
            url: https://fortune.com/2026/07/02/sam-altman-new-world-order-ai-openai-google-anthropic/
